<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Service — Download Quote</title>
    <style>
      :root {
        font-family: system-ui, Segoe UI, Roboto, sans-serif;
        color: #1a1a1a;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f4f4f5;
      }
      .card {
        background: #fff;
        padding: 2rem 2.25rem;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        max-width: 420px;
        width: 100%;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0 0 1.5rem;
        font-size: 0.9rem;
        color: #52525b;
      }
      button {
        appearance: none;
        font: inherit;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        padding: 0.65rem 1.25rem;
        background: #18181b;
        color: #fff;
        width: 100%;
      }
      button:hover:not(:disabled) {
        background: #27272a;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .status {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: #71717a;
        min-height: 1.25em;
      }
      .status.error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Quote PDF</h1>
      <p>
        Generates a PDF from the server’s sample quote data
        (<code>src/sample-data.json</code>).
      </p>
      <button type="button" id="download">Download PDF</button>
      <p class="status" id="status" aria-live="polite"></p>
    </div>
    <script>
      (function () {
        const btn = document.getElementById("download");
        const status = document.getElementById("status");

        btn.addEventListener("click", async function () {
          status.textContent = "";
          status.classList.remove("error");
          btn.disabled = true;
          status.textContent = "Loading data…";

          try {
            const dataRes = await fetch("/api/pdf/sample-data");
            if (!dataRes.ok) {
              throw new Error("Could not load sample data (" + dataRes.status + ")");
            }
            const payload = await dataRes.json();

            status.textContent = "Generating PDF…";
            const pdfRes = await fetch("/api/pdf/download", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!pdfRes.ok) {
              let msg = "PDF generation failed (" + pdfRes.status + ")";
              try {
                const err = await pdfRes.json();
                if (err.message) msg = err.message;
              } catch (_) {}
              throw new Error(msg);
            }

            const blob = await pdfRes.blob();
            const raw =
              payload.original_filename ||
              payload.originalFileName ||
              "quote.pdf";
            const filename = String(raw).toLowerCase().endsWith(".pdf")
              ? raw
              : raw + ".pdf";

            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            a.rel = "noopener";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            status.textContent = "Download started.";
          } catch (e) {
            status.textContent = e.message || "Something went wrong.";
            status.classList.add("error");
          } finally {
            btn.disabled = false;
          }
        });
      })();
    </script>
  </body>
</html>
